[/Script/Engine.RendererSettings]
; ============================================================================
; OROGENY RENDERING PIPELINE — AMD Radeon 780M iGPU Optimization
; Target: 60 FPS (16.6ms frame budget)
; Aesthetic: Romantic-era landscape painting
; ============================================================================

; --- Global Illumination: Software Lumen (NO Hardware RT) ---
; Hardware RT will annihilate our iGPU frame budget. Software Lumen provides
; beautiful indirect lighting at a fraction of the cost.
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=False
r.LumenScene.Radiosity.UpdateFactor=0.5

; --- Volumetric Fog: Optimized Grid ---
; GridPixelSize=16 balances volumetric density against fill-rate cost.
; GridSizeZ=64 provides sufficient depth slices for god-ray quality.
r.VolumetricFog=True
r.VolumetricFog.GridPixelSize=16
r.VolumetricFog.GridSizeZ=64

; --- Shadows: Virtual Shadow Maps ---
; VSM gives us high-quality per-light shadows without the memory overhead
; of traditional cascaded shadow maps on our limited VRAM.
r.Shadow.Virtual.Enable=1

; --- Anti-Aliasing: Temporal Super Resolution ---
; TSR provides reconstruction-based upscaling, critical for maintaining
; visual fidelity while rendering at reduced internal resolution.
r.AntiAliasingMethod=4
r.TSR.History.SampleCount=16

; --- Additional iGPU Optimizations ---
; Cap shadow resolution to prevent VRAM pressure on shared memory
r.Shadow.MaxResolution=1024
; Nanite is safe — mesh LOD is handled by the GPU cluster culling
r.Nanite=1
; Distance field AO for cheap ambient occlusion
r.DistanceFieldAO=1
r.AOQuality=1

